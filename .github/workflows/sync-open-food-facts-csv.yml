name: Sync Open Food Facts CSV to Firestore

on:
  workflow_dispatch:
    inputs:
      chunks:
        description: "Number of CSV chunks to process"
        required: false
        default: "1"
  push:
    paths:
      - ".github/workflows/sync-open-food-facts-csv.yml"
  # Temporary 10-minute test schedule removed: scheduled cron was not firing
  # reliably. Advance the importer with a manual bulk run via workflow_dispatch
  # instead (set the "chunks" input, max 24). Re-enable a cron here only once
  # scheduling is confirmed working.
  # schedule:
  #   - cron: "*/10 * * * *"

# A slow run must not overlap another trigger and double-write.
concurrency:
  group: sync-off-csv
  cancel-in-progress: false

jobs:
  sync-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Sync Open Food Facts CSV products to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          MAX_FIRESTORE_WRITES_PER_RUN: ${{ secrets.MAX_FIRESTORE_WRITES_PER_RUN }}
          OPEN_FOOD_FACTS_USER_AGENT: ${{ secrets.OPEN_FOOD_FACTS_USER_AGENT }}
          CSV_SYNC_CHUNKS_PER_RUN: ${{ github.event.inputs.chunks || '1' }}
        run: npm run sync:off-csv
