name: Sync Open Food Facts CSV to Firestore

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        required: false
        default: "normal"
        type: choice
        options:
          - normal
          - reset-singapore
          - image-backfill
      confirm_reset:
        description: "Type RESET to confirm Firestore deletion"
        required: false
        default: ""
      chunks:
        description: "Number of CSV chunks to process"
        required: false
        default: "1"
  push:
    paths:
      - ".github/workflows/sync-open-food-facts-csv.yml"
  # Temporary 10-minute test schedule removed: scheduled cron was not firing
  # reliably. Advance the importer with a manual bulk run via workflow_dispatch
  # instead (set the "chunks" input, max 24). Re-enable a cron here only once
  # scheduling is confirmed working.
  # schedule:
  #   - cron: "*/10 * * * *"

# A slow run must not overlap another trigger and double-write. reset-singapore shares this
# group, so a reset can never run alongside an import.
concurrency:
  group: sync-off-csv
  cancel-in-progress: false

jobs:
  sync-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      # Fails the run before any Firestore credential is loaded when reset-singapore was
      # selected without the exact confirmation string. Nothing is deleted.
      - name: Guard destructive reset
        if: ${{ github.event.inputs.mode == 'reset-singapore' }}
        env:
          CONFIRM_RESET: ${{ github.event.inputs.confirm_reset }}
        run: |
          if [ "$CONFIRM_RESET" != "RESET" ]; then
            echo "::error::mode=reset-singapore requires confirm_reset to be exactly 'RESET'. Nothing was deleted."
            exit 1
          fi
          echo "Reset confirmed. product_search_index will be deleted and the cursor reset to en:singapore row 0."

      # mode=normal          → country-rotation import (unchanged), now importing imageUrl.
      # mode=reset-singapore → delete product_search_index, reset cursors, import nothing.
      # mode=image-backfill  → merge imageUrl into existing docs via its own cursor doc.
      - name: Sync Open Food Facts CSV products to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          MAX_FIRESTORE_WRITES_PER_RUN: ${{ secrets.MAX_FIRESTORE_WRITES_PER_RUN }}
          OPEN_FOOD_FACTS_USER_AGENT: ${{ secrets.OPEN_FOOD_FACTS_USER_AGENT }}
          CSV_SYNC_MODE: ${{ github.event.inputs.mode || 'normal' }}
          CSV_SYNC_CONFIRM_RESET: ${{ github.event.inputs.confirm_reset }}
          CSV_SYNC_CHUNKS_PER_RUN: ${{ github.event.inputs.chunks || '1' }}
        run: npm run sync:off-csv
